<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TXTk – Brønnøysundregistrene Søk</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-2: #1a2234;
      --border: #1e2d44;
      --border-focus: #3b82f6;
      --text: #e2e8f0;
      --text-dim: #7b8ba3;
      --text-muted: #4a5568;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --green: #10b981;
      --green-dim: rgba(16, 185, 129, 0.12);
      --orange: #f59e0b;
      --orange-dim: rgba(245, 158, 11, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    header { text-align: center; padding: 3rem 0 2.5rem; }
    header .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .5rem;
      opacity: .8;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-dim); margin-top: .5rem; font-size: .95rem; }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: border-color .25s;
    }
    .search-box:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-row { display: flex; gap: .75rem; }
    .search-row input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      font-family: inherit;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--text-muted); }

    .search-row button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem 1.5rem;
      font-family: inherit;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .search-row button:hover { opacity: .85; }
    .search-row button:disabled { opacity: .4; cursor: default; }

    .filters { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem; }
    .filters select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .4rem .7rem;
      font-family: inherit;
      font-size: .8rem;
      color: var(--text-dim);
      outline: none;
      cursor: pointer;
    }
    .filters select:focus { border-color: var(--accent); color: var(--text); }

    .quick-links { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem; }
    .quick-links a {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .9rem;
      font-size: .78rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: all .2s;
    }
    .quick-links a:hover { border-color: var(--accent); color: var(--text); }
    .quick-links a .icon { font-size: 1rem; }

    .status { font-size: .82rem; color: var(--text-dim); margin-bottom: 1rem; min-height: 1.5em; }
    .status .count { color: var(--accent); font-weight: 600; }

    .results { display: flex; flex-direction: column; gap: .75rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover { border-color: var(--border-focus); transform: translateY(-1px); }
    .card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .5rem;
    }
    .card-name { font-weight: 700; font-size: 1.05rem; }
    .card-orgnr {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--accent);
      background: var(--accent-glow);
      padding: .2rem .55rem;
      border-radius: 5px;
      white-space: nowrap;
    }

    .card-meta { display: flex; flex-wrap: wrap; gap: .35rem .9rem; font-size: .82rem; color: var(--text-dim); }
    .card-meta span { display: inline-flex; align-items: center; gap: .3rem; }

    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 4px;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-red { background: var(--red-dim); color: var(--red); }

    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem;
      overflow-y: auto;
    }
    .detail-overlay.active { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
      position: relative;
      animation: slideUp .25s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 2rem; height: 2rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color .2s;
    }
    .detail-close:hover { color: var(--text); }

    .detail-panel h2 { font-size: 1.3rem; margin-bottom: .25rem; padding-right: 2.5rem; }
    .detail-panel .detail-orgnr {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: .85rem;
      margin-bottom: 1.25rem;
    }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.5rem; }
    .detail-field label {
      display: block;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: .2rem;
    }
    .detail-field p { font-size: .9rem; color: var(--text); }

    .detail-section-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: .75rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    .role-group { margin-bottom: 1.25rem; }
    .role-group h4 { font-size: .85rem; color: var(--text-dim); margin-bottom: .4rem; }
    .role-item {
      background: var(--surface-2);
      border-radius: 6px;
      padding: .6rem .8rem;
      margin-bottom: .35rem;
      font-size: .85rem;
    }
    .role-item .role-name { font-weight: 600; }
    .role-item .role-type { color: var(--text-dim); font-size: .78rem; }

    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .detail-links a {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .45rem .8rem;
      font-size: .8rem;
      color: var(--accent);
      text-decoration: none;
      transition: all .2s;
    }
    .detail-links a:hover { background: var(--accent-glow); border-color: var(--accent); }

    .spinner {
      display: none;
      width: 2rem; height: 2rem;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 2rem auto;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pagination { display: flex; justify-content: center; gap: .5rem; margin-top: 1.5rem; }
    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .45rem 1rem;
      font-family: inherit;
      font-size: .82rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s;
    }
    .pagination button:hover { border-color: var(--accent); color: var(--text); }
    .pagination button:disabled { opacity: .3; cursor: default; }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      .detail-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">TXTk</div>
      <h1>Brønnøysund<span>registrene</span></h1>
      <p>Søk i Enhetsregisteret – virksomheter, roller og nøkkelopplysninger</p>
    </header>

    <div class="search-box">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Firmanavn eller organisasjonsnummer …" autocomplete="off">
        <button id="searchBtn" onclick="doSearch()">Søk</button>
      </div>
      <div class="filters">
        <select id="filterOrgform">
          <option value="">Alle organisasjonsformer</option>
          <option value="AS">Aksjeselskap (AS)</option>
          <option value="ENK">Enkeltpersonforetak (ENK)</option>
          <option value="NUF">NUF</option>
          <option value="ANS">Ansvarlig selskap (ANS)</option>
          <option value="DA">Selskap med delt ansvar (DA)</option>
          <option value="STI">Stiftelse (STI)</option>
          <option value="FLI">Forening/lag (FLI)</option>
          <option value="SA">Samvirkeforetak (SA)</option>
        </select>
        <select id="filterKommune">
          <option value="">Alle kommuner</option>
        </select>
        <select id="filterStatus">
          <option value="">Alle statuser</option>
          <option value="false">Aktive</option>
          <option value="true">Slettet/konkurs</option>
        </select>
      </div>
    </div>

    <div class="quick-links">
      <a href="https://rettsstiftelser.brreg.no/nb/oppslag#motorvogn" target="_blank">
        <span class="icon">🚗</span> Heftelser på bil
      </a>
      <a href="https://rettsstiftelser.brreg.no/nb/oppslag" target="_blank">
        <span class="icon">📋</span> Rettsstiftelser
      </a>
      <a href="https://virksomhet.brreg.no/nb/oppslag/enheter" target="_blank">
        <span class="icon">🏢</span> Virksomhetsoppslag
      </a>
      <a href="https://www.brreg.no/registersok/kunngjoringer/" target="_blank">
        <span class="icon">📢</span> Kunngjøringer
      </a>
      <a href="https://person.brreg.no/nb/oppslag" target="_blank">
        <span class="icon">👤</span> Personoppslag
      </a>
    </div>

    <div class="status" id="status"></div>
    <div class="spinner" id="spinner"></div>
    <div class="results" id="results"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-panel" id="detailPanel"></div>
  </div>

  <script>
    const BRREG_API = 'https://data.brreg.no/enhetsregisteret/api/enheter';

    const input = document.getElementById('searchInput');
    const btn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const spinnerEl = document.getElementById('spinner');
    const paginationEl = document.getElementById('pagination');

    let currentPage = 0;
    let totalPages = 0;
    let lastQuery = '';

    input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch(page = 0) {
      const query = input.value.trim();
      if (!query) return;

      lastQuery = query;
      currentPage = page;
      btn.disabled = true;
      spinnerEl.classList.add('active');
      resultsEl.innerHTML = '';
      paginationEl.innerHTML = '';
      statusEl.textContent = 'Søker …';

      try {
        const isOrgNr = /^\d{9}$/.test(query.replace(/\s/g, ''));

        if (isOrgNr) {
          const orgnr = query.replace(/\s/g, '');
          const res = await fetch(`${BRREG_API}/${orgnr}`);
          if (!res.ok) {
            statusEl.textContent = `Ingen enhet funnet med org.nr ${orgnr}`;
            return;
          }
          const data = await res.json();
          statusEl.innerHTML = '<span class="count">1</span> treff';
          resultsEl.innerHTML = renderCard(data);
        } else {
          const params = new URLSearchParams({ navn: query, size: 20, page });

          const orgform = document.getElementById('filterOrgform').value;
          if (orgform) params.set('organisasjonsform', orgform);

          const kommune = document.getElementById('filterKommune').value;
          if (kommune) params.set('kommunenummer', kommune);

          const status = document.getElementById('filterStatus').value;
          if (status) params.set('konkurs', status);

          const res = await fetch(`${BRREG_API}?${params.toString()}`);
          const data = await res.json();

          const enheter = data?._embedded?.enheter || [];
          const totalHits = data?.page?.totalElements || 0;
          totalPages = data?.page?.totalPages || 0;

          statusEl.innerHTML = `<span class="count">${totalHits.toLocaleString('nb-NO')}</span> treff` +
            (totalPages > 1 ? ` · side ${currentPage + 1} av ${totalPages}` : '');

          if (enheter.length === 0) {
            statusEl.textContent = 'Ingen treff. Prøv et annet søkeord.';
          } else {
            resultsEl.innerHTML = enheter.map(renderCard).join('');
            renderPagination();
          }
        }
      } catch (err) {
        statusEl.textContent = 'Noe gikk galt: ' + err.message;
      } finally {
        btn.disabled = false;
        spinnerEl.classList.remove('active');
      }
    }

    function renderCard(e) {
      const addr = e.forretningsadresse || e.postadresse || {};
      const addrStr = [addr.adresse?.[0], addr.postnummer, addr.poststed].filter(Boolean).join(', ');
      const orgform = e.organisasjonsform?.beskrivelse || e.organisasjonsform?.kode || '';
      const nace = e.naeringskode1?.beskrivelse || '';
      const konkurs = e.konkurs;
      const slettedato = e.slettedato;

      let statusBadge = '';
      if (konkurs) statusBadge = '<span class="badge badge-red">Konkurs</span>';
      else if (slettedato) statusBadge = '<span class="badge badge-orange">Slettet</span>';
      else statusBadge = '<span class="badge badge-green">Aktiv</span>';

      return `
        <div class="card" onclick="showDetail('${e.organisasjonsnummer}')">
          <div class="card-head">
            <span class="card-name">${esc(e.navn)}</span>
            <span class="card-orgnr">${formatOrgnr(e.organisasjonsnummer)}</span>
          </div>
          <div class="card-meta">
            ${statusBadge}
            ${orgform ? `<span>${esc(orgform)}</span>` : ''}
            ${addrStr ? `<span>📍 ${esc(addrStr)}</span>` : ''}
            ${nace ? `<span>🏷 ${esc(nace)}</span>` : ''}
            ${e.antallAnsatte != null ? `<span>👥 ${e.antallAnsatte} ansatte</span>` : ''}
          </div>
        </div>`;
    }

    function renderPagination() {
      if (totalPages <= 1) return;
      paginationEl.innerHTML = `
        <button ${currentPage === 0 ? 'disabled' : ''} onclick="doSearch(${currentPage - 1})">← Forrige</button>
        <button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="doSearch(${currentPage + 1})">Neste →</button>`;
    }

    async function showDetail(orgnr) {
      const overlay = document.getElementById('detailOverlay');
      const panel = document.getElementById('detailPanel');
      overlay.classList.add('active');
      panel.innerHTML = '<div class="spinner active" style="display:block"></div>';

      try {
        const [enhetRes, rollerRes] = await Promise.all([
          fetch(`${BRREG_API}/${orgnr}`),
          fetch(`${BRREG_API}/${orgnr}/roller`)
        ]);

        const enhet = await enhetRes.json();
        let roller = null;
        if (rollerRes.ok) roller = await rollerRes.json();

        const addr = enhet.forretningsadresse || enhet.postadresse || {};
        const addrStr = [addr.adresse?.[0], addr.postnummer, addr.poststed].filter(Boolean).join(', ');
        const postAddr = enhet.postadresse || {};
        const postStr = [postAddr.adresse?.[0], postAddr.postnummer, postAddr.poststed].filter(Boolean).join(', ');

        let rollerHtml = '';
        if (roller?.rollegrupper?.length) {
          rollerHtml = '<div class="detail-section-title" style="margin-top:1.5rem">Roller</div>';
          for (const grp of roller.rollegrupper) {
            rollerHtml += `<div class="role-group"><h4>${esc(grp.type?.beskrivelse || 'Ukjent')}</h4>`;
            for (const role of grp.roller || []) {
              const person = role.person || role.enhet || {};
              const name = person.navn?.fornavn
                ? `${person.navn.fornavn} ${person.navn.etternavn || ''}`
                : person.navn || person.organisasjonsnummer || 'Ukjent';
              rollerHtml += `
                <div class="role-item">
                  <span class="role-name">${esc(String(name))}</span>
                  <span class="role-type">${esc(role.type?.beskrivelse || '')}</span>
                  ${role.fratraadt ? ' <span class="badge badge-orange">Fratrådt</span>' : ''}
                </div>`;
            }
            rollerHtml += '</div>';
          }
        }

        panel.innerHTML = `
          <button class="detail-close" onclick="closeDetail()">✕</button>
          <h2>${esc(enhet.navn)}</h2>
          <div class="detail-orgnr">Org.nr: ${formatOrgnr(enhet.organisasjonsnummer)}</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Organisasjonsform</label>
              <p>${esc(enhet.organisasjonsform?.beskrivelse || '-')}</p>
            </div>
            <div class="detail-field">
              <label>Stiftelsesdato</label>
              <p>${enhet.stiftelsesdato || '-'}</p>
            </div>
            <div class="detail-field">
              <label>Registreringsdato</label>
              <p>${enhet.registreringsdatoEnhetsregisteret || '-'}</p>
            </div>
            <div class="detail-field">
              <label>Ansatte</label>
              <p>${enhet.antallAnsatte ?? '-'}</p>
            </div>
            <div class="detail-field">
              <label>Forretningsadresse</label>
              <p>${esc(addrStr || '-')}</p>
            </div>
            <div class="detail-field">
              <label>Postadresse</label>
              <p>${esc(postStr || '-')}</p>
            </div>
            <div class="detail-field">
              <label>Næringskode</label>
              <p>${esc(enhet.naeringskode1?.beskrivelse || '-')}</p>
            </div>
            <div class="detail-field">
              <label>Hjemmeside</label>
              <p>${enhet.hjemmeside ? `<a href="${esc(enhet.hjemmeside)}" target="_blank" style="color:var(--accent)">${esc(enhet.hjemmeside)}</a>` : '-'}</p>
            </div>
            <div class="detail-field">
              <label>Registrert i MVA</label>
              <p>${enhet.registrertIMvaregisteret ? '✅ Ja' : '❌ Nei'}</p>
            </div>
            <div class="detail-field">
              <label>Konkurs</label>
              <p>${enhet.konkurs ? '🔴 Ja' : '🟢 Nei'}</p>
            </div>
            <div class="detail-field">
              <label>Under avvikling</label>
              <p>${enhet.underAvvikling ? '⚠️ Ja' : 'Nei'}</p>
            </div>
            <div class="detail-field">
              <label>Frivillig registrert MVA</label>
              <p>${enhet.frivilligMvaRegistrertBeskrivelser?.join(', ') || '-'}</p>
            </div>
          </div>
          ${rollerHtml}
          <div class="detail-links">
            <a href="https://virksomhet.brreg.no/nb/oppslag/enheter/${enhet.organisasjonsnummer}" target="_blank">🏢 Se på brreg.no</a>
            <a href="https://rettsstiftelser.brreg.no/nb/oppslag#virksomhet?query=${enhet.organisasjonsnummer}" target="_blank">📋 Rettsstiftelser</a>
            <a href="https://w2.brreg.no/kunngjoring/kombisok.jsp?orgnr=${enhet.organisasjonsnummer}" target="_blank">📢 Kunngjøringer</a>
            <a href="https://data.brreg.no/enhetsregisteret/api/enheter/${enhet.organisasjonsnummer}" target="_blank">{ } JSON API</a>
          </div>`;
      } catch (err) {
        panel.innerHTML = `<button class="detail-close" onclick="closeDetail()">✕</button><p>Feil: ${err.message}</p>`;
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('active');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    function formatOrgnr(nr) {
      const s = String(nr);
      return s.length === 9 ? `${s.slice(0,3)} ${s.slice(3,6)} ${s.slice(6)}` : s;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
